services:
  fastapi-app:
    build: .
    container_name: fastapi_app
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_ARTIFACT_URI: s3://mlflow
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
    command: uvicorn api.main:app --reload --host 0.0.0.0 --port 8000
    depends_on:
      - mlflow
      - minio
    ports:
      - "8000:8000"   # FastAPI
    volumes:
      - .:/app 
    restart: unless-stopped

  streamlit:
      build: .
      volumes:
        - .:/app
      command: streamlit run streamlit_app.py --server.port 7860 --server.address 0.0.0.0
      ports:
        - "7860:7860"

  mlflow:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mlflow
    environment:
      MLFLOW_ARTIFACT_URI: s3://mlflow
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
    ports:
      - "5001:5000"
    command:
      - mlflow
      - server
      - --backend-store-uri
      - postgresql+psycopg2://mlflow:mlflow@postgres:5432/mlflow
      - --default-artifact-root
      - s3://mlflow
      - --host
      - 0.0.0.0
      - --port
      - "5000"
    depends_on:
      - postgres
      - minio
    restart: unless-stopped

  postgres:
    image: postgres:16
    container_name: postgres
    environment:
      POSTGRES_USER: mlflow
      POSTGRES_PASSWORD: mlflow
      POSTGRES_DB: mlflow
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z-cpuv1  # pinned version
    container_name: minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server --address ":9000" --console-address ":9001" /data
    ports:
      - "9000:9000"      # API port
      - "9001:9001"      # Web UI port (optional)
    volumes:
      - miniodata:/data
    restart: unless-stopped

volumes:
  pgdata:
  miniodata: